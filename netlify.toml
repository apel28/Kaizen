[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "front_end/dist"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["pg", "bcrypt"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  functions = "netlify/functions"
  publish = "front_end/dist"
  command = "cd front_end && npm run dev"
